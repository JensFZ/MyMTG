<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyMTG</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #07120f;
        color: #eef8f3;
      }

      body {
        align-items: center;
        display: flex;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        margin: 0 auto;
        max-width: 520px;
        padding: 24px;
      }

      h1 {
        font-size: 28px;
        margin: 0 0 12px;
      }

      p {
        color: #a5b8af;
        line-height: 1.6;
        margin: 0;
      }

      code {
        color: #35d6a4;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MyMTG starten</h1>
      <p>
        Starte den Next-Server und synchronisiere Capacitor mit
        <code>CAP_SERVER_URL=http://&lt;deine-ip&gt;:3000</code>.
      </p>
    </main>
  </body>
</html>
